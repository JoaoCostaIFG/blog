exclude: ^posts/

repos:
  # Fast built-in hooks from pre-commit-hooks
  # prek automatically uses fast Rust implementations for these hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2500"] # Allow font files up to 2.5MB

  # Biome for JS/TS formatting (auto-fix mode)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.0.6
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.4"]

  # Prettier for CSS formatting (Biome doesn't fully support Tailwind 4 syntax)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types: [css]
